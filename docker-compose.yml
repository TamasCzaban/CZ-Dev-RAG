services:
  # ---------------------------------------------------------------------------
  # lightrag — always-on query service
  #
  # Uses a small fast model (7B) for answer synthesis. Queries hit this.
  # VRAM budget (query path, 3090 24 GB):
  #   qwen2.5:7b-instruct Q4   ~4.5 GB
  #   BGE-M3 (embedding)        ~1.5 GB
  #   headroom                  ~18 GB free for OS + other tasks
  # ---------------------------------------------------------------------------
  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: cz-dev-rag-lightrag
    restart: unless-stopped
    ports:
      - "${LIGHTRAG_PORT:-9621}:9621"
    environment:
      HOST: 0.0.0.0
      PORT: 9621
      WORKING_DIR: ${WORKING_DIR:-/app/data/rag_storage}
      INPUT_DIR: /app/data/input
      LLM_BINDING: ollama
      LLM_BINDING_HOST: http://host.docker.internal:11434
      LLM_MODEL: ${QUERY_LLM_MODEL:-qwen2.5:7b-instruct}
      EMBEDDING_BINDING: ollama
      EMBEDDING_BINDING_HOST: http://host.docker.internal:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3:latest}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      MAX_ASYNC: ${MAX_ASYNC:-1}
      TIMEOUT: 0
      LLM_TIMEOUT: ${LLM_TIMEOUT:-300}
      EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-300}
      EMBEDDING_FUNC_MAX_ASYNC: ${EMBEDDING_FUNC_MAX_ASYNC:-2}
      LIGHTRAG_MODE_DEFAULT: ${LIGHTRAG_MODE_DEFAULT:-hybrid}
    volumes:
      - ./data/input:/app/data/input
      - ./data/rag_storage:/app/data/rag_storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9621/health', timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # lightrag-ingest — on-demand ingestion service (32B model)
  #
  # Spin up only when ingesting new documents — Ollama can't hold both 32B
  # and 7B in VRAM simultaneously on a 3090 (18 + 4.5 + 1.5 ≈ 24 GB limit).
  # Shares the same rag_storage volume as the query service so the graph is
  # immediately available to queries after ingestion completes.
  #
  # Usage:
  #   docker compose --profile ingest up lightrag-ingest   # start
  #   docker compose --profile ingest stop lightrag-ingest  # stop when done
  #
  # VRAM budget (ingest path, 3090 24 GB):
  #   qwen2.5:32b-instruct Q4_K_M   ~18 GB
  #   BGE-M3 (embedding)             ~1.5 GB
  #   total                          ~19.5 GB ✓
  # ---------------------------------------------------------------------------
  lightrag-ingest:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: cz-dev-rag-lightrag-ingest
    profiles: [ingest]
    restart: "no"
    ports:
      - "${LIGHTRAG_INGEST_PORT:-9622}:9621"
    environment:
      HOST: 0.0.0.0
      PORT: 9621
      WORKING_DIR: ${WORKING_DIR:-/app/data/rag_storage}
      INPUT_DIR: /app/data/input
      LLM_BINDING: ollama
      LLM_BINDING_HOST: http://host.docker.internal:11434
      LLM_MODEL: ${INGEST_LLM_MODEL:-qwen2.5:32b-instruct-q4_K_M}
      EMBEDDING_BINDING: ollama
      EMBEDDING_BINDING_HOST: http://host.docker.internal:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3:latest}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      MAX_ASYNC: ${INGEST_MAX_ASYNC:-1}
      TIMEOUT: 0
      LLM_TIMEOUT: ${INGEST_LLM_TIMEOUT:-1800}
      EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-300}
      EMBEDDING_FUNC_MAX_ASYNC: ${EMBEDDING_FUNC_MAX_ASYNC:-2}
    volumes:
      - ./data/input:/app/data/input
      - ./data/rag_storage:/app/data/rag_storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9621/health', timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # BGE-reranker-v2-m3 — cross-encoder reranking via infinity-emb
  #
  # Runs on CPU. VRAM during normal operation (query path, 7B loaded):
  #   qwen2.5:7b-instruct Q4   ~4.5 GB
  #   BGE-M3 (embedding)        ~1.5 GB
  #   BGE-reranker-v2-m3        ~1-2 GB GPU (enough headroom now)
  # To enable GPU reranking: change `--device cpu` to `--device cuda` and
  # uncomment the deploy.resources.reservations.devices stanza below.
  # ---------------------------------------------------------------------------
  reranker:
    image: michaelf34/infinity:latest
    container_name: cz-dev-rag-reranker
    restart: unless-stopped
    command: >
      v2
      --model-id BAAI/bge-reranker-v2-m3
      --port 7997
      --device cpu
    # GPU variant (enable when VRAM budget allows):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7997/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: cz-dev-rag-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-change-me-please}
      POSTGRES_DB: ${LANGFUSE_DB_NAME:-langfuse}
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  langfuse-web:
    image: langfuse/langfuse:2
    container_name: cz-dev-rag-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-change-me-please}@langfuse-postgres:5432/${LANGFUSE_DB_NAME:-langfuse}
      NEXTAUTH_URL: ${LANGFUSE_HOST:-http://localhost:3000}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-to-a-long-random-string-please}
      SALT: ${LANGFUSE_SALT:-change-me-to-another-long-random-string-please}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-CZ Dev}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-cz-dev-rag}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # mcp — Model Context Protocol server
  #
  # TWO ways to run this:
  #
  # 1. Host machine (Tamas — full stack including MCP):
  #      docker compose --profile client up -d
  #    All services start. lightrag, reranker, langfuse, AND mcp.
  #    LIGHTRAG_HOST defaults to http://lightrag:9621 (Docker internal DNS).
  #
  # 2. Client-only (Zsombor — no local LightRAG stack):
  #      docker compose --profile client up mcp -d
  #    Only the mcp container starts. lightrag/reranker/langfuse are NOT
  #    pulled or started. Set LIGHTRAG_HOST in .env to point at Tamas's
  #    machine via Tailscale, e.g.:
  #      LIGHTRAG_HOST=http://100.x.y.z:9621
  #    The MCP server boots cleanly and fails fast at query time when the
  #    remote host is unreachable — it does NOT crash on startup.
  #
  # NOTE: `profiles: [client]` means this service is EXCLUDED from the
  # default `docker compose up` (no profile) AND from `--profile ingest`.
  # The default profile boots only the backend stack (lightrag + reranker +
  # langfuse) without the MCP server. Use --profile client to include it.
  # ---------------------------------------------------------------------------
  mcp:
    build:
      context: .
      dockerfile: src/mcp_server/Dockerfile
    profiles: [client]
    environment:
      LIGHTRAG_HOST: ${LIGHTRAG_HOST:-http://lightrag:9621}
    stdin_open: true
    tty: true

volumes:
  langfuse_data:
